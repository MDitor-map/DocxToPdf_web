<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convertisseur DOCX → PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --bg: #f4f6fa;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --border: #e5e7eb;
    --success: #10b981;
    --danger: #ef4444;
    --radius: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --border: #334155;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1.8rem;
  }
  .subtitle {
    color: var(--muted);
    margin-bottom: 24px;
  }
  .dropzone {
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--primary);
    background: color-mix(in srgb, var(--primary) 5%, var(--card));
  }
  .dropzone svg {
    width: 48px;
    height: 48px;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }
  .dropzone p { margin: 4px 0; }
  .dropzone .hint { color: var(--muted); font-size: .9rem; }
  #fileInput { display: none; }

  .toolbar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
    margin: 20px 0;
    padding: 16px;
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  .toolbar .filename {
    flex: 1;
    min-width: 200px;
    font-weight: 500;
  }
  button {
    background: var(--primary);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover:not(:disabled) { background: var(--primary-hover); }
  button:disabled { opacity: .5; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  button.secondary:hover:not(:disabled) {
    background: var(--bg);
  }

  .progress-wrap {
    display: none;
    margin: 16px 0;
  }
  .progress-wrap.active { display: block; }
  .progress-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--primary);
    transition: width .3s ease;
  }
  .progress-text {
    font-size: .85rem;
    color: var(--muted);
    margin-top: 6px;
    text-align: center;
  }

  .preview {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    min-height: 400px;
    margin-top: 16px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  .preview:empty::before {
    content: "La prévisualisation apparaîtra ici…";
    color: var(--muted);
    font-style: italic;
  }
  .preview img { max-width: 100%; height: auto; }
  .preview table { border-collapse: collapse; width: 100%; }
  .preview td, .preview th {
    border: 1px solid var(--border);
    padding: 6px 10px;
  }
  .preview h1, .preview h2, .preview h3 { margin-top: 1.2em; }

  .status {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: .9rem;
    display: none;
  }
  .status.active { display: block; }
  .status.success { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
  .status.error { background: color-mix(in srgb, var(--danger) 15%, transparent); color: var(--danger); }

  .options {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 8px;
    font-size: .9rem;
    color: var(--muted);
  }
  .options label {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .options select, .options input[type="number"] {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card);
    color: var(--text);
  }
</style>
</head>
<body>
<div class="container">
  <h1>📄 Convertisseur DOCX → PDF</h1>
  <p class="subtitle">Tout se passe localement dans votre navigateur. Aucun fichier n'est envoyé sur Internet.</p>

  <label for="fileInput" class="dropzone" id="dropzone">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M7 16a4 4 0 01-.88-7.9A5 5 0 0115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
    </svg>
    <p><strong>Cliquez ou glissez un fichier .docx ici</strong></p>
    <p class="hint">Le traitement est entièrement local</p>
    <input type="file" id="fileInput" accept=".docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
  </label>

  <div class="toolbar" id="toolbar" style="display:none;">
    <span class="filename" id="filename"></span>
    <div class="options">
      <label>Qualité :
        <select id="qualitySelect">
          <option value="0.8">Basse (rapide)</option>
          <option value="1" selected>Normale</option>
          <option value="1.5">Haute (lent)</option>
        </select>
      </label>
    </div>
    <button class="secondary" id="resetBtn">Nouveau fichier</button>
    <button id="downloadBtn"> Télécharger en PDF</button>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Préparation…</div>
  </div>

  <div class="status" id="status"></div>

  <div class="preview" id="preview"></div>
</div>

<script>
const { jsPDF } = window.jspdf;

const fileInput = document.getElementById('fileInput');
const dropzone = document.getElementById('dropzone');
const preview = document.getElementById('preview');
const toolbar = document.getElementById('toolbar');
const filenameEl = document.getElementById('filename');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const statusEl = document.getElementById('status');
const qualitySelect = document.getElementById('qualitySelect');

let currentHtml = '';
let currentName = '';

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status active ' + type;
}
function hideStatus() { statusEl.className = 'status'; }

function setProgress(pct, text) {
  progressWrap.classList.add('active');
  progressFill.style.width = pct + '%';
  if (text) progressText.textContent = text;
}
function hideProgress() { progressWrap.classList.remove('active'); }

// Drag & drop
['dragenter', 'dragover'].forEach(evt =>
  dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.add('dragover'); })
);
['dragleave', 'drop'].forEach(evt =>
  dropzone.addEventListener(evt, e => { e.preventDefault(); dropzone.classList.remove('dragover'); })
);
dropzone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

async function handleFile(file) {
  hideStatus();
  if (!file.name.toLowerCase().endsWith('.docx')) {
    showStatus('❌ Veuillez sélectionner un fichier .docx', 'error');
    return;
  }
  currentName = file.name.replace(/\.docx$/i, '');
  filenameEl.textContent = ' ' + file.name;
  setProgress(10, 'Lecture du fichier…');

  try {
    const arrayBuffer = await file.arrayBuffer();
    setProgress(40, 'Conversion en HTML…');
    const result = await mammoth.convertToHtml(
      { arrayBuffer },
      { convertImage: mammoth.images.imgElement(function(image) {
          return image.read("base64").then(function(imgBase64) {
            return { src: "data:" + image.contentType + ";base64," + imgBase64 };
          });
        })
      }
    );
    currentHtml = result.value;
    preview.innerHTML = currentHtml;
    setProgress(100, 'Prévisualisation prête ✓');
    setTimeout(hideProgress, 800);
    toolbar.style.display = 'flex';
    if (result.messages.length) {
      console.warn('Avertissements mammoth :', result.messages);
    }
  } catch (err) {
    console.error(err);
    hideProgress();
    showStatus('❌ Erreur lors de la lecture : ' + err.message, 'error');
  }
}

// Attendre le chargement de toutes les images
async function waitForImages(element) {
  const images = element.getElementsByTagName('img');
  const promises = [];
  for (let img of images) {
    if (!img.complete) {
      promises.push(new Promise((resolve) => {
        img.addEventListener('load', resolve);
        img.addEventListener('error', resolve);
      }));
    }
  }
  await Promise.all(promises);
}

// Découper le contenu en "pages" logiques pour éviter le dépassement de canvas
function splitIntoPages(container, maxHeight) {
  const children = Array.from(container.children);
  const pages = [];
  let currentPage = document.createElement('div');
  currentPage.style.cssText = container.style.cssText;
  let currentHeight = 0;

  for (const child of children) {
    const childHeight = child.offsetHeight;
    
    // Si l'élément seul dépasse la hauteur max, on le met dans une page dédiée
    if (childHeight > maxHeight && pages.length === 0 && currentHeight === 0) {
      // Élément très grand (ex: tableau), on le laisse tel quel
      currentPage.appendChild(child.cloneNode(true));
      pages.push(currentPage);
      currentPage = document.createElement('div');
      currentPage.style.cssText = container.style.cssText;
      currentHeight = 0;
      continue;
    }
    
    if (currentHeight + childHeight > maxHeight && currentHeight > 0) {
      pages.push(currentPage);
      currentPage = document.createElement('div');
      currentPage.style.cssText = container.style.cssText;
      currentHeight = 0;
    }
    
    currentPage.appendChild(child.cloneNode(true));
    currentHeight += childHeight;
  }
  
  if (currentPage.children.length > 0) {
    pages.push(currentPage);
  }
  
  return pages;
}

downloadBtn.addEventListener('click', async () => {
  if (!currentHtml || preview.innerHTML.trim() === '') {
    showStatus('❌ Aucun contenu à convertir', 'error');
    return;
  }
  
  downloadBtn.disabled = true;
  setProgress(0, 'Préparation du PDF…');

  try {
    const scale = parseFloat(qualitySelect.value);
    
    // Créer un conteneur temporaire pour le rendu PDF
    const pdfContainer = document.createElement('div');
    pdfContainer.innerHTML = currentHtml;
    pdfContainer.style.cssText = `
      position: fixed;
      left: 0;
      top: 0;
      width: 794px;
      padding: 40px;
      background: white;
      color: black;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      z-index: -1;
      visibility: hidden;
    `;
    document.body.appendChild(pdfContainer);
    
    setProgress(10, 'Chargement des images…');
    await waitForImages(pdfContainer);
    
    setProgress(20, 'Calcul de la pagination…');
    
    // Hauteur max par page en pixels (A4 = 297mm, à 96dpi = 1123px, moins les marges)
    const pageHeightPx = 1000; // ~265mm
    const pages = splitIntoPages(pdfContainer, pageHeightPx);
    
    setProgress(30, `Génération de ${pages.length} page(s)…`);
    
    // Créer le PDF
    const pdf = new jsPDF({
      orientation: 'portrait',
      unit: 'mm',
      format: 'a4',
      compress: true
    });
    
    const pdfWidth = 210; // mm
    const pdfHeight = 297; // mm
    const margin = 10; // mm
    const contentWidth = pdfWidth - (margin * 2);
    const contentHeight = pdfHeight - (margin * 2);
    
    for (let i = 0; i < pages.length; i++) {
      const page = pages[i];
      document.body.appendChild(page);
      
      setProgress(30 + (60 * (i + 1) / pages.length), `Rendu de la page ${i + 1}/${pages.length}…`);
      
      // Capturer la page en canvas
      const canvas = await html2canvas(page, {
        scale: scale,
        useCORS: true,
        logging: false,
        letterRendering: true,
        allowTaint: true,
        backgroundColor: '#ffffff',
        width: 794,
        windowWidth: 794
      });
      
      // Convertir en image
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      
      // Calculer les dimensions pour fitting
      const imgWidth = canvas.width;
      const imgHeight = canvas.height;
      const ratio = Math.min(contentWidth / imgWidth, contentHeight / imgHeight);
      const finalWidth = imgWidth * ratio;
      const finalHeight = imgHeight * ratio;
      
      // Centrer sur la page
      const x = (pdfWidth - finalWidth) / 2;
      const y = (pdfHeight - finalHeight) / 2;
      
      if (i > 0) {
        pdf.addPage();
      }
      pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
      
      document.body.removeChild(page);
    }
    
    document.body.removeChild(pdfContainer);
    
    setProgress(95, 'Sauvegarde du PDF…');
    pdf.save(currentName + '.pdf');
    
    setProgress(100, 'PDF généré avec succès ✓');
    setTimeout(hideProgress, 1000);
    showStatus(`✅ PDF téléchargé : ${currentName}.pdf (${pages.length} page(s))`, 'success');
    
  } catch (err) {
    console.error('Erreur PDF:', err);
    hideProgress();
    showStatus('❌ Erreur lors de la génération : ' + err.message, 'error');
  } finally {
    downloadBtn.disabled = false;
  }
});

resetBtn.addEventListener('click', () => {
  preview.innerHTML = '';
  toolbar.style.display = 'none';
  fileInput.value = '';
  currentHtml = '';
  currentName = '';
  hideStatus();
  hideProgress();
});
</script>
</body>
</html>
